<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Кейсы с прокруткой</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            background: linear-gradient(135deg, #0a0f1e, #0a0a2a);
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            text-align: center;
            padding: 20px;
        }
        
        .balance {
            background: rgba(0,0,0,0.5);
            padding: 15px 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: inline-block;
        }
        
        .balance span {
            font-size: 36px;
            color: gold;
            font-weight: bold;
        }
        
        .cases {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .case {
            background: linear-gradient(145deg, #1e1e3e, #0e0e2e);
            border-radius: 20px;
            padding: 20px;
            width: 200px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255,215,0,0.3);
        }
        
        .case:hover {
            transform: translateY(-5px);
            border-color: gold;
        }
        
        .case-icon {
            font-size: 60px;
            margin-bottom: 10px;
        }
        
        .case-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .case-price {
            color: gold;
            font-size: 20px;
        }
        
        /* Окно с прокруткой */
        .slot-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .slot-window {
            background: linear-gradient(145deg, #2a2a3a, #1a1a2a);
            border-radius: 30px;
            padding: 30px;
            border: 3px solid gold;
            min-width: 500px;
        }
        
        .slot-title {
            font-size: 24px;
            color: gold;
            margin-bottom: 20px;
        }
        
        .reels {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }
        
        .reel {
            width: 120px;
            height: 160px;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid gold;
            position: relative;
        }
        
        .reel-strip {
            position: absolute;
            width: 100%;
            transition: transform 1.8s cubic-bezier(0.2, 0.9, 0.3, 1.1);
        }
        
        .reel-item {
            height: 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e, #0a0a1e);
            border-bottom: 1px solid gold;
        }
        
        .reel-value {
            font-size: 32px;
            font-weight: bold;
        }
        
        .reel-name {
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.7;
        }
        
        .slot-status {
            font-size: 18px;
            margin: 20px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
        }
        
        .slot-result {
            font-size: 24px;
            font-weight: bold;
            margin: 15px 0;
        }
        
        button {
            background: linear-gradient(45deg, #ff6b6b, #ff4757);
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        .value-common { color: #9e9e9e; }
        .value-rare { color: #4caf50; }
        .value-epic { color: #2196f3; }
        .value-legendary { color: #ff9800; }
        .value-jackpot { color: #ff4444; }
        
        .blink {
            animation: blink 0.5s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="balance">
            💰 БАЛАНС: <span id="balance">1000</span> монет
        </div>
        
        <div class="cases">
            <div class="case" onclick="openCase(1)">
                <div class="case-icon">🍀</div>
                <div class="case-name">Lucky Starter</div>
                <div class="case-price">100 монет</div>
            </div>
            <div class="case" onclick="openCase(2)">
                <div class="case-icon">🔥</div>
                <div class="case-name">Premium Vault</div>
                <div class="case-price">500 монет</div>
            </div>
            <div class="case" onclick="openCase(3)">
                <div class="case-icon">💎</div>
                <div class="case-name">Legendary</div>
                <div class="case-price">1000 монет</div>
            </div>
        </div>
        
        <div style="font-size: 12px; opacity: 0.6;">👇 НАЖМИ НА КЕЙС 👇</div>
    </div>
    
    <div id="slotOverlay" class="slot-overlay">
        <div class="slot-window">
            <div class="slot-title">🎰 ОТКРЫТИЕ КЕЙСА 🎰</div>
            <div class="reels" id="reels"></div>
            <div class="slot-status" id="slotStatus">Нажми на кейс...</div>
            <div class="slot-result" id="slotResult"></div>
            <button onclick="closeSlot()">ЗАКРЫТЬ</button>
        </div>
    </div>
    
    <script>
        let balance = 1000;
        let isSpinning = false;
        
        // ВЫИГРЫШИ ДЛЯ КАЖДОГО КЕЙСА
        const items = {
            1: [
                {value: 20, name: "Обычный скин", rarity: "common"},
                {value: 50, name: "Необычный", rarity: "common"},
                {value: 100, name: "Редкий", rarity: "rare"},
                {value: 200, name: "Эпический", rarity: "epic"},
                {value: 400, name: "Легендарный", rarity: "legendary"},
                {value: 800, name: "Мифический", rarity: "jackpot"},
                {value: 2000, name: "🔥 ДЖЕКПОТ!", rarity: "jackpot"}
            ],
            2: [
                {value: 200, name: "Редкий предмет", rarity: "rare"},
                {value: 400, name: "Эпический", rarity: "epic"},
                {value: 700, name: "Легендарный", rarity: "legendary"},
                {value: 1200, name: "Мифический", rarity: "jackpot"},
                {value: 2000, name: "Божественный", rarity: "jackpot"},
                {value: 4000, name: "🔥 ДЖЕКПОТ!", rarity: "jackpot"},
                {value: 8000, name: "💀 ВОЙД", rarity: "jackpot"}
            ],
            3: [
                {value: 500, name: "Эпический", rarity: "epic"},
                {value: 1000, name: "Легендарный", rarity: "legendary"},
                {value: 2000, name: "Мифический", rarity: "jackpot"},
                {value: 3500, name: "Древний", rarity: "jackpot"},
                {value: 6000, name: "Божественный", rarity: "jackpot"},
                {value: 10000, name: "🔥 ПЛАМЯ", rarity: "jackpot"},
                {value: 20000, name: "👑 КОРОЛЬ", rarity: "jackpot"},
                {value: 50000, name: "🌈 АБСОЛЮТ", rarity: "jackpot"}
            ]
        };
        
        const prices = {1: 100, 2: 500, 3: 1000};
        
        function updateBalance() {
            document.getElementById('balance').textContent = balance;
        }
        
        // Выбор выигрыша с шансами
        function getRandomItem(caseId) {
            const caseItems = items[caseId];
            
            // Чем больше ценность, тем меньше шанс
            let total = 0;
            const weighted = caseItems.map(item => {
                let weight = 100 / (item.value ** 0.5);
                weight = Math.max(3, Math.min(40, weight));
                total += weight;
                return {item, weight};
            });
            
            let rand = Math.random() * total;
            let accum = 0;
            for (let w of weighted) {
                accum += w.weight;
                if (rand <= accum) return w.item;
            }
            return caseItems[0];
        }
        
        async function spinSlot(caseId, finalItem) {
            const caseItems = items[caseId];
            const reelHeight = 160;
            const finalIndex = caseItems.findIndex(i => i.value === finalItem.value);
            
            const reelsDiv = document.getElementById('reels');
            reelsDiv.innerHTML = '';
            
            // Создаём 3 барабана
            for (let r = 0; r < 3; r++) {
                const reel = document.createElement('div');
                reel.className = 'reel';
                const strip = document.createElement('div');
                strip.className = 'reel-strip';
                strip.id = `strip-${r}`;
                
                // Лента из предметов (повторяем 8 раз для длины)
                let html = '';
                for (let repeat = 0; repeat < 8; repeat++) {
                    for (let item of caseItems) {
                        html += `
                            <div class="reel-item">
                                <div class="reel-value value-${item.rarity}">${item.value}</div>
                                <div class="reel-name">${item.name}</div>
                            </div>
                        `;
                    }
                }
                strip.innerHTML = html;
                reel.appendChild(strip);
                reelsDiv.appendChild(reel);
            }
            
            // Показываем окно
            document.getElementById('slotOverlay').style.display = 'flex';
            document.getElementById('slotStatus').innerHTML = '🎰 БАРАБАНЫ КРУТЯТСЯ... 🎰';
            document.getElementById('slotStatus').className = 'slot-status blink';
            document.getElementById('slotResult').innerHTML = '';
            
            await new Promise(r => setTimeout(r, 100));
            
            // Запускаем прокрутку каждого барабана
            const promises = [];
            for (let r = 0; r < 3; r++) {
                const strip = document.getElementById(`strip-${r}`);
                const itemsCount = 8 * caseItems.length;
                const spins = 10 + Math.floor(Math.random() * 10);
                const finalPos = (spins * itemsCount + finalIndex) * reelHeight;
                
                promises.push(new Promise(resolve => {
                    strip.style.transform = `translateY(-${finalPos}px)`;
                    setTimeout(resolve, 1800);
                }));
            }
            
            await Promise.all(promises);
            
            // Показываем результат
            document.getElementById('slotStatus').innerHTML = '✨ ВЫ ВЫИГРАЛИ! ✨';
            document.getElementById('slotStatus').className = 'slot-status';
            document.getElementById('slotResult').innerHTML = `
                <div style="font-size: 20px;">🎁 ${finalItem.name} 🎁</div>
                <div class="value-${finalItem.rarity}" style="font-size: 36px;">+${finalItem.value} монет!</div>
            `;
        }
        
        async function openCase(caseId) {
            if (isSpinning) {
                alert("Подожди, кейс уже открывается!");
                return;
            }
            
            const price = prices[caseId];
            
            if (balance < price) {
                alert(`Не хватает монет! Нужно ${price}, у тебя ${balance}`);
                return;
            }
            
            isSpinning = true;
            
            // Списываем цену
            balance -= price;
            updateBalance();
            
            // Выбираем выигрыш
            const won = getRandomItem(caseId);
            
            // Запускаем анимацию прокрутки
            await spinSlot(caseId, won);
            
            // Добавляем выигрыш
            balance += won.value;
            updateBalance();
            
            isSpinning = false;
        }
        
        function closeSlot() {
            document.getElementById('slotOverlay').style.display = 'none';
        }
        
        // Закрытие по клику на фон
        window.onclick = function(e) {
            if (e.target === document.getElementById('slotOverlay')) {
                closeSlot();
            }
        };
        
        updateBalance();
    </script>
</body>
</html>
