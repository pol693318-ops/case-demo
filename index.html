<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Opener - Slot Machine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            color: white;
        }
        
        .header {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .balance-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        
        .balance-label {
            font-size: 14px;
            opacity: 0.7;
        }
        
        .balance-value {
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .cases-container {
            padding: 40px;
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .case-card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            width: 250px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .case-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .case-image {
            width: 150px;
            height: 150px;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }
        
        .case-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .case-price {
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
        }
        
        /* Слот-машина - стили обязательно видны */
        .slot-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        
        .slot-window {
            background: linear-gradient(145deg, #2a2a3a, #1a1a2a);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            border: 3px solid #ffd700;
            min-width: 600px;
        }
        
        .slot-title {
            font-size: 24px;
            margin-bottom: 20px;
            color: #ffd700;
        }
        
        .reels {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }
        
        .reel {
            width: 150px;
            height: 180px;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #ffd700;
            position: relative;
        }
        
        .reel-strip {
            position: absolute;
            width: 100%;
            transition: transform 1.5s cubic-bezier(0.2, 0.9, 0.3, 1.1);
        }
        
        .reel-item {
            height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-bottom: 1px solid #ffd700;
        }
        
        .reel-value {
            font-size: 42px;
            font-weight: bold;
        }
        
        .reel-name {
            font-size: 12px;
            margin-top: 10px;
            opacity: 0.8;
        }
        
        .value-common { color: #9e9e9e; }
        .value-rare { color: #4caf50; }
        .value-epic { color: #2196f3; }
        .value-legendary { color: #ff9800; }
        .value-mythical { color: #9c27b0; }
        .value-jackpot { color: #ff4444; }
        
        .slot-status {
            font-size: 18px;
            margin: 20px 0;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
        }
        
        .slot-result {
            font-size: 28px;
            font-weight: bold;
            margin: 20px 0;
        }
        
        .slot-close {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        
        .slot-close:hover {
            transform: scale(1.05);
        }
        
        .spinning {
            animation: blink 0.5s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            margin-top: 40px;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🎰 CASE SLOT MACHINE</div>
        <div class="balance-card">
            <div class="balance-label">💰 BALANCE</div>
            <div class="balance-value" id="balance">1000</div>
        </div>
    </div>
    
    <div class="cases-container">
        <div class="case-card" onclick="openCaseWithSlot(1)">
            <div class="case-image">🍀</div>
            <div class="case-name">Lucky Starter</div>
            <div class="case-price">100 coins</div>
        </div>
        <div class="case-card" onclick="openCaseWithSlot(2)">
            <div class="case-image">🔥</div>
            <div class="case-name">Premium Vault</div>
            <div class="case-price">500 coins</div>
        </div>
        <div class="case-card" onclick="openCaseWithSlot(3)">
            <div class="case-image">💎</div>
            <div class="case-name">Legendary</div>
            <div class="case-price">1000 coins</div>
        </div>
    </div>
    
    <div class="footer">
        🔒 Нажми на кейс → появится слот-машина → барабан прокрутится → узнаешь выигрыш
    </div>
    
    <!-- Окно слота -->
    <div id="slotOverlay" class="slot-overlay">
        <div class="slot-window">
            <div class="slot-title">🎰 OPENING CASE... 🎰</div>
            <div class="reels" id="reelsContainer"></div>
            <div class="slot-status" id="slotStatus">Нажми на кейс, чтобы начать</div>
            <div class="slot-result" id="slotResult"></div>
            <button class="slot-close" onclick="closeSlot()">Закрыть</button>
        </div>
    </div>
    
    <script>
        let currentBalance = 1000;
        let isPlaying = false;
        
        // Предметы для каждого кейса
        const itemsByCase = {
            1: [  // Starter - 100 монет
                {value: 10, name: "Мусор", rarity: "common"},
                {value: 25, name: "Обычный", rarity: "common"},
                {value: 50, name: "Необычный", rarity: "common"},
                {value: 100, name: "Редкий", rarity: "rare"},
                {value: 200, name: "Эпический", rarity: "epic"},
                {value: 400, name: "Легендарный", rarity: "legendary"},
                {value: 800, name: "Мифический", rarity: "mythical"},
                {value: 2000, name: "🔥 ДЖЕКПОТ 🔥", rarity: "jackpot"}
            ],
            2: {  // Premium - 500 монет
                values: [200, 350, 550, 800, 1200, 1800, 3000, 6000, 12000],
                names: ["Редкий", "Эпический", "Легендарный", "Мифический", "Божественный", "🔥 Адский", "💀 Войд", "👑 Королевский", "🌈 БОГ"],
                rarities: ["rare", "epic", "legendary", "mythical", "mythical", "jackpot", "jackpot", "jackpot", "jackpot"]
            },
            3: {  // Legendary - 1000 монет
                values: [500, 900, 1500, 2500, 4000, 7000, 12000, 20000, 35000, 60000],
                names: ["Эпический", "Легендарный", "Мифический", "Древний", "Божественный", "🔥 Бессмертный", "💀 Жнец", "👑 Император", "⭐ ЗВЕЗДА", "🌈 АБСОЛЮТ"],
                rarities: ["epic", "legendary", "mythical", "mythical", "jackpot", "jackpot", "jackpot", "jackpot", "jackpot", "jackpot"]
            }
        };
        
        // Преобразуем 2 и 3 кейс в массивы объектов
        itemsByCase[2] = itemsByCase[2].values.map((val, i) => ({
            value: val,
            name: itemsByCase[2].names[i],
            rarity: itemsByCase[2].rarities[i]
        }));
        
        itemsByCase[3] = itemsByCase[3].values.map((val, i) => ({
            value: val,
            name: itemsByCase[3].names[i],
            rarity: itemsByCase[3].rarities[i]
        }));
        
        const casePrices = {1: 100, 2: 500, 3: 1000};
        
        function updateBalanceDisplay() {
            document.getElementById('balance').textContent = currentBalance;
        }
        
        // Выбор предмета с весами (крупные выпадают реже)
        function selectRandomItem(items) {
            // Создаем веса: чем крупнее приз, тем меньше шанс
            let totalWeight = 0;
            const weighted = items.map(item => {
                let weight = 100 / (1 + Math.pow(item.value / 50, 0.7));
                weight = Math.max(3, Math.min(40, weight));
                totalWeight += weight;
                return {item, weight};
            });
            
            let rand = Math.random() * totalWeight;
            let accum = 0;
            for (let w of weighted) {
                accum += w.weight;
                if (rand <= accum) return w.item;
            }
            return items[0];
        }
        
        // Создание барабанов с прокручивающимися цифрами
        async function showSlotAnimation(caseId, finalItem) {
            const items = itemsByCase[caseId];
            const reelHeight = 180; // высота одного элемента
            
            // Находим индекс финального предмета
            const finalIndex = items.findIndex(item => item.value === finalItem.value);
            
            const reelsContainer = document.getElementById('reelsContainer');
            reelsContainer.innerHTML = '';
            
            // Создаем 3 барабана
            for (let r = 0; r < 3; r++) {
                const reel = document.createElement('div');
                reel.className = 'reel';
                const strip = document.createElement('div');
                strip.className = 'reel-strip';
                strip.id = `strip-${r}`;
                
                // Добавляем все предметы несколько раз для длинной ленты
                let html = '';
                for (let cycle = 0; cycle < 6; cycle++) {
                    for (let item of items) {
                        const rarityClass = `value-${item.rarity}`;
                        html += `
                            <div class="reel-item">
                                <div class="reel-value ${rarityClass}">${item.value}</div>
                                <div class="reel-name">${item.name}</div>
                            </div>
                        `;
                    }
                }
                strip.innerHTML = html;
                reel.appendChild(strip);
                reelsContainer.appendChild(reel);
            }
            
            // Показываем оверлей
            const overlay = document.getElementById('slotOverlay');
            const statusDiv = document.getElementById('slotStatus');
            const resultDiv = document.getElementById('slotResult');
            
            overlay.style.display = 'flex';
            statusDiv.innerHTML = '🎰 БАРАБАНЫ КРУТЯТСЯ... 🎰';
            statusDiv.className = 'slot-status spinning';
            resultDiv.innerHTML = '';
            
            // Небольшая пауза для рендера
            await new Promise(r => setTimeout(r, 100));
            
            // Запускаем прокрутку для каждого барабана с разным временем остановки
            const promises = [];
            for (let r = 0; r < 3; r++) {
                const strip = document.getElementById(`strip-${r}`);
                const itemsPerReel = 6 * items.length;
                const rotations = 8 + Math.floor(Math.random() * 8); // случайное количество оборотов
                const targetIndex = finalIndex;
                const finalPosition = (rotations * itemsPerReel + targetIndex) * reelHeight;
                
                promises.push(new Promise(resolve => {
                    strip.style.transition = 'transform 1.6s cubic-bezier(0.2, 0.9, 0.3, 1.1)';
                    strip.style.transform = `translateY(-${finalPosition}px)`;
                    setTimeout(resolve, 1700);
                }));
            }
            
            await Promise.all(promises);
            
            // Показываем результат
            const rarityClass = `value-${finalItem.rarity}`;
            statusDiv.innerHTML = '✨ ВЫ ВЫИГРАЛИ! ✨';
            statusDiv.className = 'slot-status';
            resultDiv.innerHTML = `
                <div style="font-size: 24px;">🎁 ${finalItem.name} 🎁</div>
                <div class="${rarityClass}" style="font-size: 42px; margin-top: 10px;">+${finalItem.value} МОНЕТ!</div>
            `;
        }
        
        // Основная функция открытия кейса
        async function openCaseWithSlot(caseId) {
            if (isPlaying) {
                alert('Подожди, кейс уже открывается...');
                return;
            }
            
            const price = casePrices[caseId];
            
            if (currentBalance < price) {
                alert(`Не хватает монет! Нужно ${price} монет. Обнови страницу для сброса.`);
                return;
            }
            
            isPlaying = true;
            
            // Списываем цену
            currentBalance -= price;
            updateBalanceDisplay();
            
            // Выбираем предмет
            const items = itemsByCase[caseId];
            const wonItem = selectRandomItem(items);
            
            // Запускаем анимацию слота
            await showSlotAnimation(caseId, wonItem);
            
            // Добавляем выигрыш
            currentBalance += wonItem.value;
            updateBalanceDisplay();
            
            isPlaying = false;
        }
        
        function closeSlot() {
            document.getElementById('slotOverlay').style.display = 'none';
            document.getElementById('slotStatus').innerHTML = 'Нажми на кейс, чтобы начать';
            document.getElementById('slotStatus').className = 'slot-status';
            document.getElementById('slotResult').innerHTML = '';
        }
        
        // Закрытие по клику на фон
        window.onclick = function(e) {
            const overlay = document.getElementById('slotOverlay');
            if (e.target === overlay) {
                closeSlot();
            }
        };
        
        updateBalanceDisplay();
    </script>
</body>
</html>
